name: Daily_Signals_Automation

on:
  schedule:
    # This triggers the robot every day at 19:00 UTC (10:00 PM in Ethiopia)
    - cron: '0 19 * * *' 
  workflow_dispatch: # Allows you to manually trigger the "First Strike"

# Institutional Log Hygiene
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run_signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Quant Stack
        run: |
          pip install --upgrade pip
          pip install numpy pandas yfinance pandas_datareader numerapi lxml

      - name: Execute Macro-Systemic Engine
        env:
          NUMERAI_PUBLIC_KEY: ${{ secrets.NUMERAI_PUBLIC_KEY }}
          NUMERAI_SECRET_KEY: ${{ secrets.NUMERAI_SECRET_KEY }}
        run: python signals_script.py
