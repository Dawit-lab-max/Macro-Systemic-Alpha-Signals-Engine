name: Daily_Signals_Automation
on:
  schedule:
    - cron: '0 19 * * *' 
  workflow_dispatch: 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  run_signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Pinned Quant Stack
        run: |
          pip install --upgrade pip
          pip install pandas==2.1.4 pandas-datareader==0.10.0 numpy==1.26.4
          pip install yfinance numerapi lxml beautifulsoup4
      - name: Execute Macro Engine
        env:
          NUMERAI_PUBLIC_KEY: ${{ secrets.NUMERAI_PUBLIC_KEY }}
          NUMERAI_SECRET_KEY: ${{ secrets.NUMERAI_SECRET_KEY }}
        run: python signals_script.py
