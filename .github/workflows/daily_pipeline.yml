name: Institutional_Daily_Automation_Signals

on:
  schedule:
    # Runs at 19:00 UTC (22:00 EAT / Addis Time)
    # This is the ideal time for Signals data availability.
    - cron: '0 19 * * *' 
  workflow_dispatch: 

jobs:
  run_alpha_engine:
    runs-on: ubuntu-latest
    
    concurrency:
      group: signals-submission
      cancel-in-progress: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Quant Stack
        run: |
          pip install --upgrade pip
          pip install numpy pandas scipy numerapi polars lightgbm yfinance pyarrow requests

      # Executes the Signals Alpha Factory
      - name: Execute Macro-Systemic Engine
        env:
          NUMERAI_PUBLIC_KEY: ${{ secrets.NUMERAI_PUBLIC_KEY }}
          NUMERAI_SECRET_KEY: ${{ secrets.NUMERAI_SECRET_KEY }}
        run: python signals_script.py

      - name: Production Status
        if: success()
        run: echo "SIGNALS ALPHA DEPLOYED."
