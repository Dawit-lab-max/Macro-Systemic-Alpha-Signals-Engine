name: Daily_Signals_Automation

on:
  schedule:
    # Redundant triggers at 19:00 UTC (10:00 PM Ethiopia)
    - cron: '0 19 * * *' 
  workflow_dispatch: # Allows manual trigger

# Institutional Log Hygiene
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run_signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pinned Quant Stack
        run: |
          pip install --upgrade pip
          # Fixing the 'deprecate_kwarg' bug via version pinning
          pip install pandas==2.1.4 pandas-datareader==0.10.0
          pip install numpy yfinance numerapi lxml beautifulsoup4

      - name: Execute Macro-Systemic Engine
        env:
          NUMERAI_PUBLIC_KEY: ${{ secrets.NUMERAI_PUBLIC_KEY }}
          NUMERAI_SECRET_KEY: ${{ secrets.NUMERAI_SECRET_KEY }}
        run: python signals_script.py
